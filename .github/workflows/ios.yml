name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22


    - name: Install dependencies
      run: npm install


    - name: Sync Capacitor
      run: npx cap sync ios


    - name: Install Xcode tools
      run: xcodebuild -version


    - name: Build archive
      run: |
        cd ios/App
        xcodebuild \
        -scheme App \
        -configuration Release \
        -archivePath build/App.xcarchive \
        archive \
        CODE_SIGNING_ALLOWED=NO


    - name: Export IPA
      run: |
        cd ios/App
        mkdir Payload
        cp -R build/App.xcarchive/Products/Applications/App.app Payload/
        zip -r PhotoApp.ipa Payload
        

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: PhotoApp
        path: ios/App/PhotoApp.ipa
